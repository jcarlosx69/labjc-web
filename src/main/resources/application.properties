# =============================================
# Configuración común a todos los perfiles
# =============================================
spring.application.name=labjc-web

# Conexión a la base de datos (se sobreescribirá por el perfil activo)
spring.datasource.url=jdbc:mariadb://localhost:3306/labjc_db
spring.datasource.username=${LABJC_DB_USER}
spring.datasource.password=${LABJC_DB_PASSWORD}

# Driver MariaDB
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# El dialecto se autodetecta, no es necesario especificarlo
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# DDL: actualiza el esquema sin borrar datos
spring.jpa.hibernate.ddl-auto=update

# Ruta de descargas: valor por defecto para producción
labjc.downloads.path=${LABJC_DOWNLOADS_PATH:/opt/labjc-web/downloads}