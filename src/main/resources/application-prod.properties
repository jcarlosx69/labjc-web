# URL estándar sin parámetros extra
spring.datasource.url=jdbc:mariadb://localhost:3306/labjc_db

# Credenciales obligatoriamente por variables de entorno del sistema
# (definidas en labjc.service — sin valores por defecto intencionadamente)
spring.datasource.username=${LABJC_DB_USER}
spring.datasource.password=${LABJC_DB_PASSWORD}