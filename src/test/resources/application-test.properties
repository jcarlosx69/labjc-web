# =============================================
# Perfil TEST — solo para ejecución de tests
# No contiene credenciales reales
# =============================================

# Base de datos H2 en memoria (no requiere MariaDB arrancado)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Ruta de descargas ficticia para tests
labjc.downloads.path=/tmp/test-downloads

# JWT: valores ficticios exclusivos para tests (mínimo 32 caracteres)
labjc.admin.jwt.secret=test-secret-key-for-junit-tests-only!!
labjc.admin.jwt.expiration-ms=3600000

# Credenciales admin ficticias para tests
labjc.admin.username=testadmin
labjc.admin.password=testpassword